name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (core + dev + file + security)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,file,security]"

      - name: Run tests
        run: pytest -q

      - name: Run synthetic benchmark (regression check)
        run: |
          for seed in 0 1 2 3; do
            python -m k_pii.eval.benchmark -n 60 --seed $seed
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ || true   # 경고 표시만, 실패 X
